<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Studium-Tracker</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Only redirect paths under /lernplan/studium-app/ into the app;
      // everything else (typos on the other static pages) just gets a plain 404.
      var l = window.location;
      if (l.pathname.indexOf('/lernplan/studium-app/') === 0) {
        var pathSegmentsToKeep = 2; // /lernplan/studium-app
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
            '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        );
      }
    </script>
  </head>
  <body>
    <p>404 – Seite nicht gefunden.</p>
  </body>
</html>
