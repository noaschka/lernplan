name: Deploy Studium-Tracker App

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-studium-app.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build

      - name: Sync build output into /studium-app
        run: |
          rm -rf studium-app
          mkdir -p studium-app
          cp -r app/dist/. studium-app/

      - name: Commit and push build output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add studium-app
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "chore: deploy studium-app build [skip ci]"
            git push
          fi
