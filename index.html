
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body,div{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.wrap{max-width:560px;margin:0 auto;padding:2rem 1.25rem 4rem}
h1{font-size:24px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.sub{font-size:14px;color:#888;margin-bottom:2rem}
.steps{display:flex;align-items:center;margin-bottom:2rem}
.sdot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;transition:all .2s}
.sline{flex:1;height:2px;margin:0 4px 18px}
.slbl{font-size:11px;margin-top:6px;text-align:center;white-space:nowrap;font-weight:500}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tab{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #e0e0e0;background:#f8f8f8;color:#666;transition:all .15s}
.tab:hover{border-color:#1a1a2e;color:#1a1a2e}
.tab.on{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.card{background:#fff;border:1.5px solid #e8e8e8;border-radius:16px;padding:1.5rem;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-title{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1.25rem}
.frow{display:grid;gap:12px;margin-bottom:12px}
.frow.two{grid-template-columns:1fr 1fr}
.frow.one{grid-template-columns:1fr}
.field label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px}
.field input,.field select{width:100%;padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:inherit;color:#1a1a2e;background:#fff;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:#1a1a2e;box-shadow:0 0 0 3px rgba(26,26,46,.08)}
.colors{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.cdot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.cdot:hover{transform:scale(1.1)}
.cdot.on{border-color:#1a1a2e;transform:scale(1.15);box-shadow:0 0 0 2px #fff,0 0 0 4px #1a1a2e}
.emojis{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.ebtn{width:36px;height:36px;border-radius:10px;border:1.5px solid #e8e8e8;background:#f8f8f8;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ebtn:hover{border-color:#1a1a2e;background:#fff}
.ebtn.on{border-color:#1a1a2e;background:#fff;box-shadow:0 0 0 3px rgba(26,26,46,.12)}
.wblk{background:#f9f9f9;border:1.5px solid #ebebeb;border-radius:12px;padding:14px;margin-bottom:10px}
.task-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.task-num{width:20px;font-size:12px;color:#bbb;flex-shrink:0;text-align:right}
.task-row input{flex:1;padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;color:#1a1a2e;background:#fff;outline:none}
.task-row input:focus{border-color:#1a1a2e}
.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#444;transition:all .15s;font-family:inherit}
.btn:hover{background:#f5f5f5}
.btn.pri{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.btn.pri:hover{background:#2c3e50}
.btn.grn{background:#22c55e;color:#fff;border-color:#22c55e;font-size:16px;padding:14px 32px}
.btn.grn:hover{background:#16a34a}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn.del{color:#ef4444;border-color:#fecaca;background:#fff5f5}
.btn.add{background:#f8f8f8;border-style:dashed;color:#888;width:100%;margin-top:6px}
.btn.add:hover{background:#f0f0f0;color:#555}
.nav{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-top:2rem;padding-top:1.5rem;border-top:1.5px solid #f0f0f0;gap:8px}
.nav-l{display:flex;justify-content:flex-start}
.nav-m{font-size:12px;color:#bbb;font-weight:500;text-align:center;white-space:nowrap}
.nav-r{display:flex;justify-content:flex-end}
.hint{font-size:13px;color:#888;padding:10px 14px;background:#f8f8f8;border-radius:10px;border:1.5px solid #efefef;margin-bottom:14px;line-height:1.5}
.sum-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border-left:4px solid;margin-bottom:8px}
.dl-area{text-align:center;padding:2.5rem 1rem;border:2px dashed #e0e0e0;border-radius:16px;margin-top:1rem;background:#fafafa}
</style>

<div class="wrap">
  <h1>Lernplan-Generator</h1>
  <p class="sub">F&uuml;ll das Formular aus &mdash; am Ende bekommst du deine HTML-Datei.</p>
  <div class="steps" id="ind"></div>
  <div id="content"></div>
  <div class="nav">
    <div class="nav-l"><button class="btn" id="bBack">&larr; Zur&uuml;ck</button></div>
    <span class="nav-m" id="ctr"></span>
    <div class="nav-r"><button class="btn pri" id="bNext">Weiter &rarr;</button></div>
  </div>
</div>

<script>
var C=[{h:'#e74c3c',a:'#ff6b6b',n:'Rot'},{h:'#e67e22',a:'#f39c12',n:'Orange'},{h:'#27ae60',a:'#58d68d',n:'Gr\u00fcn'},{h:'#1abc9c',a:'#48c9b0',n:'T\u00fcrkis'},{h:'#2980b9',a:'#5dade2',n:'Blau'},{h:'#8e44ad',a:'#bb8fce',n:'Lila'},{h:'#c0392b',a:'#e74c3c',n:'Dunkelrot'},{h:'#16a085',a:'#1abc9c',n:'Dunkelgr\u00fcn'},{h:'#d35400',a:'#e67e22',n:'Braun'},{h:'#1a1a2e',a:'#2c3e50',n:'Dunkel'}];
var EM=['\ud83d\udcd8','\ud83d\udcd7','\ud83d\udcd9','\ud83d\udcd5','\ud83d\udcd0','\ud83d\udcbb','\u26db\ufe0f','\ud83d\udcb0','\ud83d\udd2c','\ud83d\udcca','\ud83e\uddee','\ud83d\udcdd','\ud83d\udee0\ufe0f','\u2699\ufe0f','\ud83d\udd2b'];
var SL=['Allgemein','Pr\u00fcfungen','Lernpl\u00e4ne','Download'];
var step=0, maxStep=0, tab=0;
var D={t:'Pr\u00fcfungsplan',s:'Sommersemester 2026',ex:[],pl:{}};

function ge(i){if(!D.ex[i])D.ex[i]={id:i+1,f:'',d:'',u:'09:00',r:'',e:5,c:C[i%C.length].h,a:C[i%C.length].a,k:'',em:EM[i]};return D.ex[i];}
function gp(k){if(!D.pl[k])D.pl[k]=[{w:1,z:'',t:'',au:['']}];return D.pl[k];}
function hx(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function v(id){var el=document.getElementById(id);return el?el.value:'';}
function q(s){return document.querySelector(s);}
function qa(s){return Array.prototype.slice.call(document.querySelectorAll(s));}

// ── Globale goToStep Funktion – direkt via onclick aufrufbar ──────────────────
window.goToStep=function(target){
  if(target===step)return;
  if(target>maxStep)return;
  if(step===1)sx();
  if(step===2)sp();
  step=target;tab=0;draw();
};

function ri(){
  var h='';
  SL.forEach(function(label,i){
    var isDone=i<step;
    var isActive=i===step;
    var isVisited=i<=maxStep;
    var bg=isDone?'#22c55e':isActive?'#1a1a2e':'#f1f1f1';
    var co=isDone||isActive?'#fff':'#aaa';
    var lc=isDone?'#22c55e':'#e0e0e0';
    var canClick=isVisited&&!isActive;
    var cursor=canClick?'pointer':'default';
    var hover=canClick?'text-decoration:underline;text-underline-offset:2px':'';
    var onclick=canClick?'onclick="goToStep('+i+')"':'';
    h+='<div style="display:flex;flex-direction:column;align-items:center">'
      +'<div class="sdot" style="background:'+bg+';color:'+co+';cursor:'+cursor+'" '+onclick+'>'+(isDone?'&#10003;':i+1)+'</div>'
      +'<div class="slbl" style="color:'+(isDone?'#22c55e':isActive?'#1a1a2e':'#bbb')+';cursor:'+cursor+';'+hover+'" '+onclick+'>'+label+'</div>'
      +'</div>';
    if(i<SL.length-1)h+='<div class="sline" style="background:'+lc+'"></div>';
  });
  document.getElementById('ind').innerHTML=h;
}

function fld(lbl,id,val,type,ph){
  return'<div class="field"><label>'+lbl+'</label>'
    +'<input id="'+id+'" type="'+(type||'text')+'" value="'+hx(val||'')+'" '+(ph?'placeholder="'+hx(ph)+'"':'')+' autocomplete="off">'
    +'</div>';
}

function p0(){
  var cnt=D.ex.length||3;
  var sel=[1,2,3,4,5,6].map(function(n){return'<option value="'+n+'"'+(cnt===n?' selected':'')+'>'+n+' Pr\u00fcfung'+(n>1?'en':'')+'</option>';}).join('');
  return'<div class="card"><div class="card-title">App-Einstellungen</div>'
    +'<div class="frow one">'+fld('App-Titel','it',D.t,'text','z.B. Pr\u00fcfungsplan')+'</div>'
    +'<div class="frow one">'+fld('Semester','is',D.s,'text','z.B. Sommersemester 2026')+'</div>'
    +'<div class="frow one"><div class="field"><label>Anzahl Pr\u00fcfungen</label><select id="ic">'+sel+'</select></div></div>'
    +'</div>';
}

function p1(){
  var cnt=parseInt((document.getElementById('ic')&&document.getElementById('ic').value)||D.ex.length||3);
  while(D.ex.length<cnt)D.ex.push(null);
  D.ex=D.ex.slice(0,cnt);
  var tabs=D.ex.map(function(_,i){var e=ge(i);return'<div class="tab'+(tab===i?' on':'')+'" data-ti="'+i+'">'+e.em+' '+(e.k||'Fach '+(i+1))+'</div>';}).join('');
  var e=ge(tab);
  var dateDisp=e.d?new Date(e.d+'T00:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}):'\u2013';
  return'<div class="tabs">'+tabs+'</div>'
    +'<div class="card"><div class="card-title">Fach '+(tab+1)+' von '+D.ex.length+'</div>'
    +'<div class="frow one">'+fld('Fachname *','if',e.f,'text','z.B. Mathematik 2')+'</div>'
    +'<div class="frow two">'+fld('K\u00fcrzel (max 4)','ik',e.k,'text','z.B. M2')+fld('ECTS','ie',e.e,'number')+'</div>'
    +'<div class="frow two">'+fld('Pr\u00fcfungsdatum *','id',e.d,'date')+fld('Uhrzeit','iu',e.u,'time')+'</div>'
    +'<div class="frow one">'+fld('Raum','ir',e.r,'text','z.B. HS 2')+'</div>'
    +'<div class="field" style="margin-bottom:12px"><label>Emoji</label><div class="emojis">'+EM.map(function(em,i){return'<div class="ebtn'+(e.em===em?' on':'')+'" data-ei="'+i+'">'+em+'</div>';}).join('')+'</div></div>'
    +'<div class="field"><label>Farbe</label><div class="colors">'+C.map(function(c){return'<div class="cdot'+(e.c===c.h?' on':'')+'" data-ch="'+c.h+'" data-ca="'+c.a+'" style="background:'+c.h+'" title="'+c.n+'"></div>';}).join('')+'</div></div>'
    +'<div style="margin-top:16px;padding:12px 14px;border-radius:12px;border-left:4px solid '+e.c+';border:1px solid '+e.c+'33;border-left:4px solid '+e.c+';background:'+e.c+'0e">'
    +'<div style="font-weight:700;font-size:15px;color:#1a1a2e">'+e.em+' '+(e.f||'Fachname')+'</div>'
    +'<div style="font-size:12px;color:#666;margin-top:3px">'+dateDisp+' &middot; '+e.u+(e.r?' &middot; '+e.r:'')+'</div>'
    +'</div></div>';
}

function p2(){
  if(!D.ex.length)return'<div class="hint">Bitte zuerst Pr\u00fcfungen eintragen.</div>';
  var tabs=D.ex.map(function(_,i){var e=ge(i);return'<div class="tab'+(tab===i?' on':'')+'" data-ti="'+i+'">'+e.em+' '+(e.k||'F'+(i+1))+'</div>';}).join('');
  var ex=ge(tab);var k=ex.k||('F'+(tab+1));var plan=gp(k);
  var weeks=plan.map(function(w,wi){
    var rows=w.au.map(function(t,ai){
      return'<div class="task-row"><span class="task-num">'+(ai+1)+'</span>'
        +'<input data-wi="'+wi+'" data-ai="'+ai+'" class="ainp" value="'+hx(t)+'" placeholder="Aufgabe eingeben...">'
        +(w.au.length>1?'<button class="btn sm del" data-dai="'+wi+'-'+ai+'">&times;</button>':'')
        +'</div>';
    }).join('');
    return'<div class="wblk">'
      +'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">'
      +'<div style="width:26px;height:26px;border-radius:50%;background:'+ex.c+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">'+(wi+1)+'</div>'
      +'<input data-wi="'+wi+'" class="wtit" value="'+hx(w.t)+'" placeholder="Thema dieser Woche..." style="flex:1;min-width:120px;font-weight:600;font-size:14px;padding:6px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-family:inherit;color:#1a1a2e;outline:none;background:#fff">'
      +'<input data-wi="'+wi+'" class="wrng" value="'+hx(w.z)+'" placeholder="01.09\u201307.09" style="width:115px;font-size:12px;padding:6px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-family:inherit;color:#1a1a2e;outline:none;background:#fff">'
      +(plan.length>1?'<button class="btn sm del" data-dwi="'+wi+'">Woche &times;</button>':'')
      +'</div>'+rows
      +'<button class="btn sm add" data-aai="'+wi+'">+ Aufgabe</button>'
      +'</div>';
  }).join('');
  return'<div class="tabs">'+tabs+'</div>'
    +'<div class="hint">\ud83d\udca1 Aufgaben sp\u00e4ter auch direkt in der App erg\u00e4nzbar.</div>'
    +weeks+'<button class="btn add" id="aWk">+ Woche hinzuf\u00fcgen</button>';
}

function p3(){
  var rows=D.ex.map(function(e,i){
    var ex=ge(i);var pl=D.pl[ex.k||('F'+(i+1))]||[];
    var tc=pl.reduce(function(s,w){return s+w.au.filter(function(a){return a.trim();}).length;},0);
    return'<div class="sum-row" style="border-left-color:'+ex.c+';background:'+ex.c+'0e">'
      +'<div style="font-size:22px">'+ex.em+'</div>'
      +'<div style="flex:1"><div style="font-weight:700;font-size:14px;color:#1a1a2e">'+(ex.f||'&ndash;')+'</div>'
      +'<div style="font-size:12px;color:#888;margin-top:2px">'+(ex.d?new Date(ex.d+'T00:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'}):'-')+' &middot; '+pl.length+' Wochen &middot; '+tc+' Aufgaben</div></div>'
      +'<span style="background:'+ex.c+';color:#fff;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600">'+ex.k+'</span>'
      +'</div>';
  }).join('');
  return'<div class="card"><div class="card-title">Zusammenfassung</div>'+rows+'</div>'
    +'<div class="dl-area"><div style="font-size:36px;margin-bottom:12px">\ud83c\udf89</div>'
    +'<div style="font-size:18px;font-weight:700;color:#1a1a2e;margin-bottom:6px">Lernplan ist bereit!</div>'
    +'<div style="font-size:14px;color:#888;margin-bottom:20px;line-height:1.5">Lade die Datei herunter und &ouml;ffne sie im Browser.<br>Alle Daten werden lokal gespeichert.</div>'
    +'<button class="btn grn" id="dlBtn">&darr;&nbsp; HTML herunterladen</button></div>';
}

function sx(){var e=ge(tab);e.f=v('if');e.k=(v('ik')||'').toUpperCase().slice(0,4);e.e=parseInt(v('ie'))||5;e.d=v('id');e.u=v('iu');e.r=v('ir');}
function sp(){var k=ge(tab).k||('F'+(tab+1));var plan=gp(k);plan.forEach(function(w,wi){var t=q('.wtit[data-wi="'+wi+'"]');if(t)w.t=t.value;var r=q('.wrng[data-wi="'+wi+'"]');if(r)w.z=r.value;qa('.ainp[data-wi="'+wi+'"]').forEach(function(inp,ai){w.au[ai]=inp.value;});});}
function js(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\r?\n/g,' ');}

function genHTML(){
  var exArr=D.ex.map(function(e,i){var ex=ge(i);return"{id:"+ex.id+",f:'"+js(ex.f)+"',d:'"+ex.d+"',u:'"+ex.u+"',r:'"+js(ex.r)+"',e:"+ex.e+",c:'"+ex.c+"',a:'"+ex.a+"',k:'"+ex.k+"',em:'"+ex.em+"'}";}).join(',');
  var plObj=Object.keys(D.pl).map(function(k){var ei=D.ex.findIndex(function(e){return e&&e.k===k;});var fc=ei>=0?ge(ei).c:'#1a1a2e';var wks=D.pl[k].map(function(w){var aus=w.au.filter(function(a){return a.trim();}).map(function(a){return"'"+js(a)+"'";}).join(',');return"{w:"+w.w+",z:'"+js(w.z)+"',t:'"+js(w.t)+"',f:'"+fc+"',au:["+aus+"]}";}).join(',');return"'"+k+"':["+wks+"]";}).join(',');
  return'<!DOCTYPE html>\n<html lang="de">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n<meta name="apple-mobile-web-app-capable" content="yes">\n<meta name="apple-mobile-web-app-title" content="'+js(D.t)+'">\n<title>'+js(D.t)+'</title>\n<style>\n*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}\nbody{font-family:-apple-system,Segoe UI,system-ui,sans-serif;background:#f8f9fa;min-height:100vh;color:#1a1a2e}\n#app{max-width:480px;margin:0 auto;padding:20px 16px 60px}\n</style>\n</head>\n<body>\n<div id="app"></div>\n<script>\nvar TIT=\''+js(D.t)+'\';\nvar SEM=\''+js(D.s)+'\';\nvar exams=['+exArr+'];\nvar plans={'+plObj+'};\n'+getEngine()+'\n<\/script>\n</body>\n</html>';
